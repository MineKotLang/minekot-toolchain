# MineKot toolchain verification
name: Build and check

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolchain-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build, test, and smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: Execute toolchain verification
        run: >-
          ./gradlew check mineKotSmokeTest --warning-mode=fail --no-scan --no-daemon
          --no-configuration-cache --no-build-cache
