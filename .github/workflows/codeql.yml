name: CodeQL

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-java@v5.6.0
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v6.2.0
        if: matrix.language == 'java-kotlin'

      # CodeQL 2.26.1 rejects Kotlin 2.4.10. Remove after its next bundle supports 2.4.10.
      - name: Select CodeQL-supported Kotlin
        if: matrix.language == 'java-kotlin'
        run: sed -i "s/^kotlin = .*/kotlin = \"2.4.0\"/" gradle/libs.versions.toml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Java and Kotlin
        if: matrix.build-mode == 'manual'
        run: >-
          ./gradlew assemble --warning-mode=fail --no-scan --no-daemon
          --no-configuration-cache --no-build-cache

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
